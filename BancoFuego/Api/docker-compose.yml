version: '3.9'
services:
  api:
    build: .
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: BancoFuego
      DB_USER: postgres
      DB_PASSWORD: Admin123456
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: BancoFuego
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin123456
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
